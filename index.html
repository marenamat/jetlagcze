<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JetLag CZE – PID stops</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: sans-serif;
      font-size: 14px;
    }

    /* ── Topbar ──────────────────────────────────────────────────────── */

    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: #e8e8e8;
      border-bottom: 1px solid #bbb;
      flex-shrink: 0;
    }

    #panel-toggle {
      padding: 3px 9px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #fff;
      font-size: 15px;
      line-height: 1;
    }
    #panel-toggle:hover { background: #ddd; }

    #status { color: #555; white-space: nowrap; margin-left: auto; }

    /* ── Slide-out panel ─────────────────────────────────────────────── */

    #panel {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      background: #f4f4f4;
      border-bottom: 1px solid #ccc;
      overflow: hidden;
      max-height: 400px;
      transition: max-height 0.2s ease, border-width 0.2s ease;
      flex-shrink: 0;
    }

    #panel.collapsed {
      max-height: 0;
      border-bottom-width: 0;
    }

    /* Each logical group is a column */
    .pg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 7px 12px;
      border-right: 1px solid #ddd;
      min-width: 0;
    }
    .pg:last-child { border-right: none; }

    .pg-title {
      font-size: 11px;
      font-weight: bold;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pg-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pg label { font-weight: bold; white-space: nowrap; }
    .pg label.light { font-weight: normal; }
    .sep { color: #bbb; }

    input[type="date"] {
      padding: 2px 5px;
      border: 1px solid #aaa;
      border-radius: 3px;
    }

    input[type="range"] { width: 80px; }
    .rv { min-width: 3.2em; text-align: right; color: #333; font-variant-numeric: tabular-nums; }

    #clear-btn, .pg-btn {
      padding: 2px 8px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #fff;
    }
    #clear-btn:hover, .pg-btn:hover { background: #e0e0e0; }

    #zone-filter { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    #zone-filter label { font-weight: normal; }

    /* Search */
    #search-wrap { position: relative; display: inline-block; }
    #stop-search { padding: 2px 6px; border: 1px solid #aaa; border-radius: 3px; width: 150px; }
    #search-dropdown {
      display: none; position: absolute; top: 100%; left: 0; z-index: 9999;
      background: #fff; border: 1px solid #aaa; border-radius: 3px;
      max-height: 200px; overflow-y: auto; min-width: 220px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .search-item { padding: 4px 8px; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .search-item:hover { background: #eee; }

    /* ── Map ─────────────────────────────────────────────────────────── */

    #map { flex: 1; min-height: 0; }

    /* ── Popups ──────────────────────────────────────────────────────── */

    .freq-stats table { border-collapse: collapse; margin-top: 6px; font-size: 13px; }
    .freq-stats td { padding: 1px 6px; }
    .freq-stats td:first-child { color: #555; }
    .freq-stats td:last-child { font-variant-numeric: tabular-nums; }
    .freq-loading { color: #888; font-style: italic; }

    .expand-btn, .collapse-btn {
      margin-top: 4px; padding: 2px 8px; cursor: pointer;
      border: 1px solid #aaa; border-radius: 3px;
      background: #fff; font-size: 12px;
    }
    .expand-btn:hover, .collapse-btn:hover { background: #e8e8e8; }

    .stop-override { margin-top: 6px; display: flex; gap: 4px; }
    .ovr-btn { padding: 2px 7px; font-size: 12px; cursor: pointer; border: 1px solid #aaa; border-radius: 3px; background: #fff; }
    .ovr-btn:hover { background: #e8e8e8; }
    .ovr-btn.active { background: #c8e0ff; border-color: #5599dd; font-weight: bold; }

  </style>
</head>
<body>

<!-- Thin topbar: just the toggle and status -->
<div id="topbar">
  <button id="panel-toggle" title="Toggle filters">&#9776;</button>
  <span id="status"></span>
</div>

<!-- Slide-out panel with grouped controls -->
<div id="panel">

  <div class="pg">
    <div class="pg-title">Date</div>
    <div class="pg-row">
      <label for="date-from">From:</label>
      <input type="date" id="date-from" />
    </div>
    <div class="pg-row">
      <label for="date-to">To:</label>
      <input type="date" id="date-to" />
    </div>
    <div class="pg-row">
      <button id="clear-btn">Clear</button>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">Display</div>
    <div class="pg-row">
      <label class="light"><input type="checkbox" id="show-pseudo" /> Pseudo-stops</label>
    </div>
    <div class="pg-row">
      <label class="light"><input type="checkbox" id="coverage-toggle" checked /> Coverage overlay</label>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">Zones</div>
    <div class="pg-row">
      <span id="zone-filter">Loading…</span>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">Frequency</div>
    <div class="pg-row">
      <label for="freq-interval">Interval:</label>
      <input type="range" id="freq-interval" min="5" max="120" step="5" value="60" />
      <span class="rv" id="freq-interval-val">60 min</span>
    </div>
    <div class="pg-row">
      <label for="freq-start">Window:</label>
      <input type="range" id="freq-start" min="0" max="23" step="1" value="9" />
      <span class="rv" id="freq-start-val">9:00</span>
      <span class="sep">–</span>
      <input type="range" id="freq-end" min="0" max="23" step="1" value="21" />
      <span class="rv" id="freq-end-val">21:00</span>
    </div>
    <div class="pg-row">
      <label for="freq-cutoff">Min avg:</label>
      <input type="range" id="freq-cutoff" min="0" max="5" step="0.1" value="2" />
      <input type="number" id="freq-cutoff-num" min="0" max="5" step="0.1" value="2"
             style="width:4em;padding:2px 4px;border:1px solid #aaa;border-radius:3px;" />
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">Search</div>
    <div class="pg-row">
      <div id="search-wrap">
        <input type="text" id="stop-search" placeholder="Stop name…" autocomplete="off" />
        <div id="search-dropdown"></div>
      </div>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">State</div>
    <div class="pg-row">
      <button class="pg-btn" id="state-save">Save YAML</button>
      <button class="pg-btn" id="state-load-btn">Load YAML</button>
      <input type="file" id="state-load-file" accept=".yaml,.yml" style="display:none" />
    </div>
    <div class="pg-row">
      <button class="pg-btn" id="state-share">Share URL</button>
      <button class="pg-btn" id="state-reset">Reset</button>
    </div>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/js-yaml@4/dist/js-yaml.min.js"></script>

<!-- Map is initialised here so it renders even if the WASM module fails to load -->
<script>
  window.map = L.map('map').setView([50.08, 14.44], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(window.map);
  window.clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
  window.map.addLayer(window.clusterGroup);

  document.getElementById('panel-toggle').addEventListener('click', function () {
    document.getElementById('panel').classList.toggle('collapsed');
  });
</script>

<script type="module" src="bootstrap.js"></script>

</body>
</html>
