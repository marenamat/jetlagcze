design_decisions:
  - pid_stops.cbor: stop positions + active dates + zone + pseudo flag; loaded eagerly
  - pid_stops_times.cbor: departure times per stop per date; large, loaded lazily
  - SQLite used as intermediate scratch DB to avoid RAM explosion during processing
  - Leaflet chosen over pure-Rust tile renderer (less error-prone)
  - Preview deployments pull CBOR from latest pid-data artifact run (not Pages URL)
  - pkg/.gitignore removed before gh-pages deploy so wasm-pack output is committed
  - Do not push to github; branches appear there after code review by user
  - T-prefix stop IDs are routing nodes (pseudo-stops), hidden by default in UI
  - Zone filter: comma-separated zone_id split into individual zones; empty zone = '-'
  - deploy.yml triggers on frontend/ changes; pid-data.yml triggers on script changes
  - First fix bugs, then think about features
  - CBOR format: integer keys (saves ~50 bytes/stop), fixed-point coords, tag-100 dates
  - load_times() still uses serde text-key format (not yet updated to integer keys)
  - Manual overrides and freq cutoff keyed by stop name (not ID) to handle merged stops

