<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JetLag CZE – PID stops</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: sans-serif;
      font-size: 14px;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #f4f4f4;
      border-bottom: 1px solid #ccc;
      flex-wrap: wrap;
    }

    #controls label { font-weight: bold; }

    #controls input[type="date"] {
      padding: 3px 6px;
      border: 1px solid #aaa;
      border-radius: 3px;
    }

    #clear-btn {
      padding: 3px 10px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #fff;
    }
    #clear-btn:hover { background: #e8e8e8; }

    #status { color: #555; margin-left: auto; }

    #map { flex: 1; }
  </style>
</head>
<body>

<div id="controls">
  <label for="date-from">Days:</label>
  <input type="date" id="date-from" />
  <span>–</span>
  <input type="date" id="date-to" />
  <button id="clear-btn">Clear</button>
  <span id="status">Loading…</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Map is initialised here so it renders even if the WASM module fails to load -->
<script>
  window.map = L.map('map').setView([50.08, 14.44], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(window.map);
  window.clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
  window.map.addLayer(window.clusterGroup);
</script>

<script type="module" src="bootstrap.js"></script>

</body>
</html>
