<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JetLag CZE – PID stops</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: sans-serif;
      font-size: 14px;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: #f4f4f4;
      border-bottom: 1px solid #ccc;
      flex-wrap: wrap;
    }

    #controls label { font-weight: bold; white-space: nowrap; }
    #controls .sep { color: #999; }

    #controls input[type="date"] {
      padding: 3px 6px;
      border: 1px solid #aaa;
      border-radius: 3px;
    }

    #controls input[type="range"] { width: 80px; }
    #controls .range-val { min-width: 3em; text-align: right; color: #333; }

    #clear-btn {
      padding: 3px 10px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #fff;
    }
    #clear-btn:hover { background: #e8e8e8; }

    #zone-filter { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    #zone-filter label { font-weight: normal; }

    #status { color: #555; margin-left: auto; white-space: nowrap; }

    #map { flex: 1; }

    /* Frequency stats popup */
    .freq-stats table { border-collapse: collapse; margin-top: 6px; font-size: 13px; }
    .freq-stats td { padding: 1px 6px; }
    .freq-stats td:first-child { color: #555; }
    .freq-stats td:last-child { font-variant-numeric: tabular-nums; }
    .freq-loading { color: #888; font-style: italic; }
  </style>
</head>
<body>

<div id="controls">
  <label for="date-from">Days:</label>
  <input type="date" id="date-from" />
  <span class="sep">–</span>
  <input type="date" id="date-to" />
  <button id="clear-btn">Clear</button>
  <label style="font-weight:normal"><input type="checkbox" id="show-pseudo" /> Show pseudo-stops</label>
  <label style="font-weight:normal"><input type="checkbox" id="coverage-toggle" checked /> Coverage</label>
  <span class="sep">|</span>
  <label>Zones:</label>
  <span id="zone-filter">Loading…</span>

  <span class="sep">|</span>

  <label for="freq-interval">Interval:</label>
  <input type="range" id="freq-interval" min="5" max="120" step="5" value="60" />
  <span class="range-val" id="freq-interval-val">60 min</span>

  <label for="freq-start">Window:</label>
  <input type="range" id="freq-start" min="0" max="23" step="1" value="9" />
  <span class="range-val" id="freq-start-val">9:00</span>
  <span class="sep">–</span>
  <input type="range" id="freq-end" min="0" max="23" step="1" value="21" />
  <span class="range-val" id="freq-end-val">21:00</span>

  <span id="status"></span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Map is initialised here so it renders even if the WASM module fails to load -->
<script>
  window.map = L.map('map').setView([50.08, 14.44], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(window.map);
  window.clusterGroup = L.markerClusterGroup({ chunkedLoading: true });
  window.map.addLayer(window.clusterGroup);
</script>

<script type="module" src="bootstrap.js"></script>

</body>
</html>
