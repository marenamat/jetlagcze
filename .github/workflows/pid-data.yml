name: Download PID GTFS Data

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [main]
    paths:
      - 'src/process_gtfs.py'
      - 'src/process_gtfs_times.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  download-gtfs:
    runs-on: ubuntu-latest
    steps:
      - name: Download and unpack PID GTFS
        run: |
          curl -fL https://data.pid.cz/PID_GTFS.zip -o PID_GTFS.zip
          unzip PID_GTFS.zip -d gtfs
          rm PID_GTFS.zip

      - name: Upload GTFS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pid-gtfs
          path: gtfs/
          retention-days: 1

  process-stops:
    needs: download-gtfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pid-gtfs
          path: gtfs/

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Process GTFS data
        run: python src/process_gtfs.py gtfs/ output/

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: pid-stops-sqlite
          path: output/pid_stops.sqlite
          retention-days: 1

      - name: Upload CBOR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pid-stops-cbor
          path: output/pid_stops.cbor
          retention-days: 7

  deploy-frontend:
    needs: process-stops
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM frontend
        run: |
          cd frontend
          wasm-pack build --release --target web --out-dir www/pkg

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r frontend/www/* site/

      - uses: actions/download-artifact@v4
        with:
          name: pid-stops-cbor
          path: site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          keep_files: true
          full_commit_message: "Deploy production site from ${{ github.sha }}"
