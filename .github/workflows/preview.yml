name: Preview Deployment

on:
  push:
    branches:
      - 'mq-claude-*'

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend
        id: check
        run: |
          if [ -d "frontend" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wasm-pack
        if: steps.check.outputs.has_frontend == 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust build
        if: steps.check.outputs.has_frontend == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM frontend
        if: steps.check.outputs.has_frontend == 'true'
        run: |
          cd frontend
          wasm-pack build --release --target web --out-dir www/pkg

      - name: Find latest successful pid-data run
        if: steps.check.outputs.has_frontend == 'true'
        id: pid_run
        run: |
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow pid-data.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' \
            > /tmp/run_id.txt
          read -r RUN_ID < /tmp/run_id.txt
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "have_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_run=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CBOR artifacts from pid-data
        if: ${{ steps.check.outputs.has_frontend == 'true' && steps.pid_run.outputs.have_run == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: pid-stops-cbor
          path: data/
          run-id: ${{ steps.pid_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download times CBOR artifact from pid-data
        if: ${{ steps.check.outputs.has_frontend == 'true' && steps.pid_run.outputs.have_run == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: pid-stops-times-cbor
          path: data/
          run-id: ${{ steps.pid_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download and process GTFS (no artifact available)
        if: ${{ steps.check.outputs.has_frontend == 'true' && steps.pid_run.outputs.have_run == 'false' }}
        run: |
          curl -fL https://data.pid.cz/PID_GTFS.zip -o PID_GTFS.zip
          unzip PID_GTFS.zip -d gtfs
          rm PID_GTFS.zip
          pip install -r requirements.txt
          mkdir -p data
          python src/process_gtfs.py gtfs/ data/

      - name: Assemble preview site
        if: steps.check.outputs.has_frontend == 'true'
        run: |
          mkdir -p site
          cp -r frontend/www/* site/
          # wasm-pack puts a .gitignore in pkg/ that would hide built files
          rm -f site/pkg/.gitignore
          cp data/pid_stops.cbor site/pid_stops.cbor
          cp data/pid_stops_times.cbor site/pid_stops_times.cbor 2>/dev/null || true

      - name: Deploy preview
        if: steps.check.outputs.has_frontend == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          destination_dir: preview/${{ github.ref_name }}
          keep_files: true
          commit_message: "Preview deploy for ${{ github.ref_name }}"
