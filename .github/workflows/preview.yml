name: Preview Deployment

on:
  push:
    branches:
      - 'mq-claude-*'

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend
        id: check
        run: |
          if [ -d "frontend" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wasm-pack
        if: steps.check.outputs.has_frontend == 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Rust build
        if: steps.check.outputs.has_frontend == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM frontend
        if: steps.check.outputs.has_frontend == 'true'
        run: |
          cd frontend
          wasm-pack build --release --target web --out-dir www/pkg

      - name: Fetch production CBOR data
        if: steps.check.outputs.has_frontend == 'true'
        id: cbor
        run: |
          mkdir -p data
          if curl -fsSL https://marenamat.github.io/jetlagcze/pid_stops.cbor \
              -o data/pid_stops.cbor; then
            echo "have_cbor=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_cbor=false" >> "$GITHUB_OUTPUT"
          fi
          curl -fsSL https://marenamat.github.io/jetlagcze/pid_stops_times.cbor \
            -o data/pid_stops_times.cbor || true

      - name: Download and process GTFS (no production data available)
        if: ${{ steps.check.outputs.has_frontend == 'true' && steps.cbor.outputs.have_cbor == 'false' }}
        run: |
          curl -fL https://data.pid.cz/PID_GTFS.zip -o PID_GTFS.zip
          unzip PID_GTFS.zip -d gtfs
          rm PID_GTFS.zip
          pip install -r requirements.txt
          mkdir -p output
          python src/process_gtfs.py gtfs/ output/
          cp output/pid_stops.cbor data/pid_stops.cbor

      - name: Assemble preview site
        if: steps.check.outputs.has_frontend == 'true'
        run: |
          mkdir -p site
          cp -r frontend/www/* site/
          # wasm-pack puts a .gitignore in pkg/ that would hide built files
          rm -f site/pkg/.gitignore
          cp data/pid_stops.cbor site/pid_stops.cbor
          cp data/pid_stops_times.cbor site/pid_stops_times.cbor 2>/dev/null || true

      - name: Deploy preview
        if: steps.check.outputs.has_frontend == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
          destination_dir: preview/${{ github.ref_name }}
          keep_files: true
          commit_message: "Preview deploy for ${{ github.ref_name }}"
